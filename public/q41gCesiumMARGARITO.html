<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Q3 2nd Graded Exercise">
    <meta name="keywords" content="HTML Forms">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Add a Movie</title>
  </head>
  <body>
     <header>
        <nav class="navbar">
            <a href="https://steph0801.github.io/4QPortfolioCSMargarito/"> Home </a>
        </nav>
    </header>
    <br/><br/>

    <section>
      <h1 class="title">Add a Movie</h1>
      <form id="dForm">
          <label> Title: 
            <br><input type="text" name="title" id="title" onblur="noInput(this)" style="width:100%; height:20px" required />
          </label><br/><br/>
          <label> Year:
            <br><input type="text" name="year" id="year" onblur="noInput(this)" style="width:100%; height:20px" required />
          </label><br/><br/>
              <label> Genre:
                <br><select name="genre" id="genre" style="width:100%; height: 26px" required>
                    <option value="Action">Action</option>
                    <option value="Horror">Horror</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Drama">Drama</option>
                    <option value="Romance">Romance</option>
                    <option value="Fantasy">Fantasy</option>
                </select>
              <label>
        <br/>
      </form>

      <div class="rating-css">
        <br><div>Rating:</div>
        <div class="star">
            <input type="radio" name="rating1" id="rating1">
            <label for="rating1" class="fa fa-star"></label>

            <input type="radio" name="rating1" id="rating2">
            <label for="rating2" class="fa fa-star"></label>

            <input type="radio" name="rating1" id="rating3">
            <label for="rating3" class="fa fa-star"></label>

            <input type="radio" name="rating1" id="rating4">
            <label for="rating4" class="fa fa-star"></label>

            <input type="radio" name="rating1" id="rating5">
            <label for="rating5" class="fa fa-star"></label>
        </div>
      </div>

      <br><button type="submit" style="width:100%">Add Movie</button>


      <h2 style="text-align:center">Movie List</h1>
    </section>

    <script>
      function noInput(ele){
        if(ele.value.trim()===""){
          ele.style.backgroundColor = "red";
        } else{
          ele.style.backgroundColor = "white";
        }
      }

      document.getElementById('dForm').addEventListener('submit', function(e) {
        e.preventDefault();

        if(confirm("Are you sure you want to submit?")){
          let rates = JSON.parse(localStorage.getItem('movieRate')) || [];

          const entry = {
            title: document.getElementById('title').value,
            year: document.getElementById('year').value,
            genre: document.getElementById('genre').value,
            rating: document.querySelector('input[name="rating1"]:checked').value,
          };

          rates.push(entry);
          localStorage.setItem('movieRate', JSON.stringify(rates));
          this.reset();
        }
      });

      function display(){
        const data = JSON.parse(localStorage.getItem('movieRate')) || [];


      } 

        window.onload = display;
    </script>
  </body>
</html>
